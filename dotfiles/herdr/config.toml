onboarding = false

[theme]
name = "catppuccin"
auto_switch = false

[theme.custom]
panel_bg = "reset"

[terminal]
new_cwd = "follow"

[update]
version_check = false
manifest_check = true

[keys]
prefix = "ctrl+b"

# General
help = "prefix+?"
settings = "prefix+s"
detach = "prefix+d"
reload_config = "prefix+r"
open_notification_target = "prefix+o"
workspace_picker = "prefix+w"
goto = "prefix+g"
toggle_sidebar = "prefix+b"
# remote_image_paste = "ctrl+v" # only active in herdr --remote; empty disables raw-key image paste

# Tabs
new_tab = "prefix+c"
rename_tab = "prefix+comma"
previous_tab = "prefix+h"
next_tab = "prefix+l"
switch_tab = "prefix+1..9"
edit_scrollback = "prefix+e"
# close_tab = "prefix+shift+x"

# Panes
zoom = "prefix+z"
split_vertical = "prefix+|"
split_horizontal = "prefix+/"
close_pane = "prefix+x"
resize_mode = "prefix+shift+r"
navigate_pane_left = ""
navigate_pane_down = ""
navigate_pane_up = ""
navigate_pane_right = ""

# Workspaces
new_workspace = "prefix+shift+n"
rename_workspace = "prefix+shift+w"
close_workspace = "prefix+shift+x"
previous_workspace = "prefix+shift+h"
next_workspace = "prefix+shift+l"
navigate_workspace_up = "k"
navigate_workspace_down = "j"

[[keys.command]]
key = "ctrl+h"
type = "plugin_action"
command = "vim-herdr-navigation.left"
description = "navigate left (vim/herdr)"

[[keys.command]]
key = "ctrl+j"
type = "plugin_action"
command = "vim-herdr-navigation.down"
description = "navigate down (vim/herdr)"

[[keys.command]]
key = "ctrl+k"
type = "plugin_action"
command = "vim-herdr-navigation.up"
description = "navigate up (vim/herdr)"

[[keys.command]]
key = "ctrl+l"
type = "plugin_action"
command = "vim-herdr-navigation.right"
description = "navigate right (vim/herdr)"

# [worktrees]
# directory = "~/.herdr/worktrees"

[ui]
sidebar_width = 30
sidebar_min_width = 30
sidebar_max_width = 30

mouse_capture = true

confirm_close = true
prompt_new_tab_name = true

pane_borders = true
pane_gaps = true

agent_panel_sort = "spaces"

[ui.toast]
delivery = "herdr"

[ui.toast.herdr]
position = "bottom-right"

[ui.toast.clipboard]
enabled = true
position = "bottom-right"

[ui.sound]
enabled = true

[session]
resume_agents_on_restore = true

[remote]
manage_ssh_config = true

[experimental]
# allow_nested = false # Allow launching herdr from inside a herdr-managed pane.
kitty_graphics = true
pane_history = false

[advanced]
scrollback_limit_bytes = 10000000
