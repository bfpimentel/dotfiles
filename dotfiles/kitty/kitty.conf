# Options
include                    ${KITTY_OS}.conf
include                    themes/everforest.conf
include                    symbols.conf

font_family                family="Iosevka Nerd Font Mono"

repaint_delay              10
sync_to_monitor            yes
input_delay                3

window_padding_width       12 12

background                 #000000
background_opacity         0.70
background_blur            10

copy_on_select             clipboard
paste_actions              quote-urls-at-prompt

clear_all_shortcuts        yes

shell_integration          enabled
notify_on_cmd_finish       unfocused

# Keybindings
map ctrl+shift+q           quit
map ctrl+shift+c           copy_or_noop
map ctrl+shift+v           paste_from_clipboard
map ctrl+shift+r           load_config_file

map ctrl+equal             change_font_size all +1.0
map ctrl+minus             change_font_size all -1.0
map ctrl+0                 change_font_size all 0

map shift+enter            send_text all \x1b\r

