config-version = 2

start-at-login = true
after-login-command = []

key-mapping.preset = 'qwerty'

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 0

default-root-container-layout = 'tiles'
default-root-container-orientation = 'horizontal'

on-focused-monitor-changed = [ 'move-mouse monitor-lazy-center' ]

exec-on-workspace-change = [ '/bin/bash', '-c', '~/.config/aerospace/handle-pip.sh' ]

persistent-workspaces = [ 'B', 'W', 'M', 'T', 'X' ]

[workspace-to-monitor-force-assignment]
T = [ 'secondary', 'main' ]
X = [ 'secondary', 'main' ]

[gaps]
outer.top =        0
outer.bottom =     0
outer.left =       0
outer.right =      0
inner.horizontal = 0
inner.vertical =   0

[mode.main.binding]
alt-semicolon = [ 'mode service' ]

cmd-h = []
cmd-alt-h = []

alt-b = 'workspace B'
alt-w = 'workspace W'
alt-m = 'workspace M'
alt-t = 'workspace T'
alt-x = 'workspace X'

alt-shift-b = 'move-node-to-workspace B'
alt-shift-w = 'move-node-to-workspace W'
alt-shift-m = 'move-node-to-workspace M'
alt-shift-t = 'move-node-to-workspace T'
alt-shift-x = 'move-node-to-workspace X'

alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

[mode.service.binding]
r = [ 'reload-config', 'mode main' ]
f = [ 'layout floating tiling' ]

minus = 'resize smart -50'
equal = 'resize smart +50'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = ['layout floating']
check-further-callbacks = true

[[on-window-detected]]
if.app-id = 'net.kovidgoyal.kitty'
run = ['layout tiling', 'move-node-to-workspace T']
check-further-callbacks = true

[[on-window-detected]]
if.app-name-regex-substring = 'Youtube Music'
run = ['layout tiling', 'move-node-to-workspace M']
check-further-callbacks = true

[[on-window-detected]]
if.window-title-regex-substring = 'Helium - Bruno'
run = ['move-node-to-workspace B']
check-further-callbacks = true

[[on-window-detected]]
if.window-title-regex-substring = 'Helium - Squibler'
run = ['move-node-to-workspace W']
check-further-callbacks = true

[[on-window-detected]]
if.app-id = 'net.imput.helium'
if.window-title-regex-substring = 'Picture-in-Picture'
run = ['layout floating']
check-further-callbacks = true

[[on-window-detected]]
if.app-id = 'net.imput.helium'
if.window-title-regex-substring = 'Bitwarden'
run = ['layout floating']
check-further-callbacks = true
