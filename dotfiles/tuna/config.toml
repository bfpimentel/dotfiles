schemaVersion = 1

[catalogs]
sortOrders = []

    [[catalogs.globalScopes]]
    catalogIdentifier = 'Tuna.CurrentSelectionCatalog'
    mode = 'some'
    selectedItemKeys = [ 'Current Clipboard' ]

    [[catalogs.globalScopes]]
    catalogIdentifier = 'Tuna.EffectsCatalog'
    mode = 'none'
    selectedItemKeys = []

    [[catalogs.globalScopes]]
    catalogIdentifier = 'Tuna.ModesCatalog'
    mode = 'some'
    selectedItemKeys = [ 'Combo Mode', 'Fuzzy Mode', 'Text Mode' ]

    [[catalogs.globalScopes]]
    catalogIdentifier = 'TunaCore.ApplicationsCatalog'
    mode = 'some'
    selectedItemKeys = [
        'About This Mac',
        'Activity Monitor',
        'AeroSpace',
        'Applications',
        'Bruno',
        'Calculator',
        'Codex',
        'Finder',
        'Font Book',
        'Helium',
        'Hidden Bar',
        'Itau',
        'LM Studio',
        'Notes',
        'Safari',
        'Screenshot',
        'Simulator',
        'Tuna',
        'Vial',
        'WireGuard',
        'Xcode-26.5.0',
        'Xcodes',
        'kitty'
    ]

    [[catalogs.globalScopes]]
    catalogIdentifier = 'TunaEmoji.EmojiCatalog'
    mode = 'none'
    selectedItemKeys = []

[[comboMode.bindings]]
key = 's'
url = 'tuna://run/path.%252FApplications%252FSafari.app/Open'

[[comboMode.bindings]]
key = 't'
url = 'tuna://run/path.%252FSystem%252FApplications%252FUtilities%252FTerminal.app/Open'

[[comboMode.bindings]]
key = 'f'
url = 'tuna://run/path.%252FSystem%252FLibrary%252FCoreServices%252FFinder.app/Open'

[[comboMode.bindings]]
key = 'm'
url = 'tuna://run/path.%252FSystem%252FApplications%252FMessages.app/Open'

[[comboMode.bindings]]
key = 'n'
url = 'tuna://run/path.%252FSystem%252FApplications%252FNotes.app/Open'

[[comboMode.bindings]]
key = 'd'
url = 'tuna://run/path.%252FUsers%252Fbruno%252FDownloads/Open'

[[comboMode.bindings]]
key = 'h'
url = 'tuna://run/path.%252FUsers%252Fbruno/Open'

[hotkeys]
custom = []

    [hotkeys.app.activate]
    carbonKeyCode = 35
    carbonModifiers = 256

[settings]
clipboardHistoryRetention = 'sevenDays'
themeIdentifier = 'com.brnbw.tuna.themes.NormieBar'